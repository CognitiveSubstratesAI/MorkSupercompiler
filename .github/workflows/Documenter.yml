name: Documentation

on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:

jobs:
  build:
    permissions:
      contents: write
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # MorkSupercompiler dev-links HPC + MORKTensorNetworks + MORK + PathMap via [sources]
      # (../HPC, ../MORKTensorNetworks, ../MORK, ../PathMap); MORKTensorNetworks + MORK in
      # turn dev-link ../MORK / ../PathMap. Clone all four siblings before instantiation,
      # else Pkg.instantiate() can't resolve the unregistered deps and the docs build fails.
      - name: Clone path [sources] dependencies (siblings)
        run: |
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/PathMap.git ../PathMap
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/MORK.git ../MORK
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/MORKTensorNetworks.git ../MORKTensorNetworks
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/HPC.git ../HPC
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Install dependencies
        run: julia --project=docs -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --project=docs docs/make.jl
